<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Catálogo digital de produtos">
  <meta name="theme-color" content="#6c5ce7" id="themeMeta">
  <title>Catálogo Digital</title>
  <style>
    :root {
      --theme: #6c5ce7;
      --theme-dark: #4736b0;
      --theme-soft: #f0edff;
      --whatsapp: #16a34a;
      --ink: #18212f;
      --muted: #667085;
      --line: #e7e9ee;
      --surface: #fff;
      --background: #f5f5f5;
      --shadow: 0 8px 30px rgba(16, 24, 40, .08);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background: var(--background);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    [hidden] { display: none !important; }

    .app-shell { width: min(100%, 1120px); margin: 0 auto; min-height: 100vh; }
    .store-header {
      position: relative;
      overflow: hidden;
      padding: max(24px, env(safe-area-inset-top)) 20px 28px;
      color: #fff;
      background: linear-gradient(145deg, var(--theme), var(--theme-dark));
      border-radius: 0 0 28px 28px;
      box-shadow: 0 12px 36px color-mix(in srgb, var(--theme) 25%, transparent);
    }
    .store-header::before, .store-header::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      pointer-events: none;
    }
    .store-header::before { width: 210px; height: 210px; top: -125px; right: -75px; }
    .store-header::after { width: 120px; height: 120px; bottom: -80px; left: -35px; }
    .store-main { position: relative; z-index: 1; display: flex; align-items: center; gap: 15px; }
    .store-avatar {
      width: 72px; height: 72px; flex: 0 0 72px; overflow: hidden;
      display: grid; place-items: center; border-radius: 50%;
      background: rgba(255,255,255,.94); color: var(--theme);
      border: 3px solid rgba(255,255,255,.72); box-shadow: 0 8px 22px rgba(0,0,0,.16);
      font-size: 29px; font-weight: 800; text-transform: uppercase;
    }
    .store-avatar img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
    .eyebrow { margin: 0 0 5px; opacity: .82; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .store-name { margin: 0; font-size: clamp(22px, 7vw, 32px); line-height: 1.15; letter-spacing: -.035em; }
    .header-whatsapp, .buy-button {
      min-height: 48px; border: 0; border-radius: 14px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 9px;
      color: #fff; background: var(--whatsapp); font-weight: 800; text-decoration: none;
      box-shadow: 0 7px 16px rgba(4, 120, 87, .2); transition: transform .15s, filter .15s;
    }
    .header-whatsapp { position: relative; z-index: 1; width: 100%; margin-top: 22px; background: #fff; color: #137c3a; box-shadow: 0 8px 22px rgba(0,0,0,.14); }
    .header-whatsapp:hover, .buy-button:hover { filter: brightness(.96); transform: translateY(-1px); }
    .header-whatsapp:active, .buy-button:active { transform: scale(.985); }
    .header-whatsapp[aria-disabled="true"] { opacity: .65; cursor: not-allowed; }
    .icon { width: 20px; height: 20px; flex: none; fill: currentColor; }

    .catalog-content { padding: 18px 14px 42px; }
    .search-box { position: relative; margin-bottom: 15px; }
    .search-box .icon { position: absolute; z-index: 1; left: 16px; top: 50%; transform: translateY(-50%); color: #808897; }
    .search-input {
      width: 100%; height: 52px; padding: 0 48px; border: 1px solid var(--line); border-radius: 17px;
      outline: 0; color: var(--ink); background: #fff; box-shadow: 0 5px 18px rgba(16,24,40,.05);
      font-size: 16px; appearance: none; transition: border-color .2s, box-shadow .2s;
    }
    .search-input::placeholder { color: #98a2b3; }
    .search-input:focus { border-color: var(--theme); box-shadow: 0 0 0 4px var(--theme-soft); }
    .clear-search { position: absolute; right: 8px; top: 8px; width: 36px; height: 36px; border: 0; border-radius: 50%; background: transparent; color: #667085; cursor: pointer; }
    .categories { display: flex; gap: 9px; overflow-x: auto; padding: 2px 1px 10px; margin: 0 -14px 14px; padding-left: 14px; padding-right: 14px; scrollbar-width: none; }
    .categories::-webkit-scrollbar { display: none; }
    .category-chip { flex: 0 0 auto; min-height: 40px; padding: 0 16px; border: 1px solid var(--line); border-radius: 999px; background: #fff; color: #475467; font-size: 14px; font-weight: 700; cursor: pointer; }
    .category-chip.active { color: #fff; border-color: var(--theme); background: var(--theme); box-shadow: 0 5px 12px color-mix(in srgb, var(--theme) 24%, transparent); }
    .section-heading { display: flex; align-items: end; justify-content: space-between; gap: 12px; margin: 5px 1px 14px; }
    .section-heading h2 { margin: 0; font-size: 19px; letter-spacing: -.02em; }
    .product-count { color: var(--muted); font-size: 13px; font-weight: 600; white-space: nowrap; }
    .products-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .product-card { overflow: hidden; display: grid; grid-template-columns: 124px 1fr; min-height: 180px; border: 1px solid rgba(231,233,238,.9); border-radius: 20px; background: var(--surface); box-shadow: 0 6px 22px rgba(16,24,40,.065); }
    .product-card.has-image { display: flex; flex-direction: column; }
    .product-image { position: relative; width: 100%; min-height: 180px; aspect-ratio: 4 / 3; display: grid; place-items: center; overflow: hidden; color: var(--theme); background: linear-gradient(145deg, var(--theme-soft), #f8f8fa); }
    .product-card.has-image .product-image { border-radius: 20px 20px 0 0; }
    .product-image.loading::before { content: ""; position: absolute; inset: 0; background: linear-gradient(100deg, rgba(233,235,239,.9) 20%, rgba(248,248,250,.95) 40%, rgba(233,235,239,.9) 60%); background-size: 220% 100%; animation: shimmer 1.35s infinite linear; }
    .product-image img { position: relative; z-index: 1; width: 100%; height: 100%; max-width: 100%; object-fit: cover; object-position: center; }
    .product-image.is-placeholder { min-height: 180px; background: linear-gradient(145deg, var(--theme-soft), #f8f8fa); }
    .product-placeholder { width: 54px; height: 54px; opacity: .72; filter: drop-shadow(0 8px 18px color-mix(in srgb, var(--theme) 18%, transparent)); }
    .product-body { min-width: 0; padding: 14px 13px; display: flex; flex-direction: column; align-items: flex-start; }
    .category-badge { max-width: 100%; margin-bottom: 7px; padding: 4px 8px; overflow: hidden; border-radius: 999px; color: var(--theme-dark); background: var(--theme-soft); font-size: 10px; line-height: 1.2; font-weight: 800; letter-spacing: .045em; text-overflow: ellipsis; text-transform: uppercase; white-space: nowrap; }
    .product-name { width: 100%; margin: 0 0 5px; overflow: hidden; font-size: 16px; line-height: 1.25; font-weight: 800; letter-spacing: -.015em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .product-description { width: 100%; margin: 0 0 10px; overflow: hidden; color: var(--muted); font-size: 12px; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .product-footer { width: 100%; margin-top: auto; }
    .product-price { display: block; margin-bottom: 9px; color: #101828; font-size: 18px; font-weight: 850; letter-spacing: -.03em; }
    .variation-group { width: 100%; margin: 0 0 11px; }
    .variation-title { display: block; margin: 0 0 7px; color: var(--muted); font-size: 11px; font-weight: 850; text-transform: uppercase; }
    .variation-options { display: flex; flex-wrap: wrap; gap: 7px; }
    .variation-chip { min-height: 32px; padding: 0 10px; border: 1px solid var(--line); border-radius: 999px; color: #475467; background: #fff; font-size: 12px; font-weight: 750; cursor: pointer; }
    .variation-chip.active { border-color: var(--theme); color: #fff; background: var(--theme); box-shadow: 0 5px 12px color-mix(in srgb, var(--theme) 24%, transparent); }
    .buy-button { width: 100%; min-height: 42px; padding: 0 10px; border-radius: 12px; font-size: 12px; }
    .buy-button .icon { width: 17px; height: 17px; }
    .product-actions { display: grid; gap: 8px; }
    .add-cart-button { width: 100%; min-height: 42px; padding: 0 10px; border: 1px solid var(--theme); border-radius: 12px; color: var(--theme-dark); background: var(--theme-soft); font-size: 12px; font-weight: 800; cursor: pointer; }
    .filters-panel { margin-bottom: 14px; padding: 14px; border: 1px solid var(--line); border-radius: 18px; background: #fff; box-shadow: 0 5px 18px rgba(16,24,40,.04); }
    .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .filter-field { min-width: 0; }
    .filter-field:first-child { grid-column: 1 / -1; }
    .filter-field label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; }
    .filter-control { width: 100%; height: 44px; padding: 0 11px; border: 1px solid var(--line); border-radius: 12px; outline: 0; color: var(--ink); background: #f9fafb; appearance: none; }
    .filter-control:focus { border-color: var(--theme); box-shadow: 0 0 0 3px var(--theme-soft); }
    .filters-footer { display: flex; justify-content: flex-end; margin-top: 10px; }
    .clear-filters { min-height: 38px; padding: 0 13px; border: 0; border-radius: 10px; color: var(--theme-dark); background: var(--theme-soft); font-size: 13px; font-weight: 800; cursor: pointer; }
    .cart-fab { position: fixed; z-index: 20; right: max(18px, env(safe-area-inset-right)); bottom: max(18px, env(safe-area-inset-bottom)); width: 62px; height: 62px; display: grid; place-items: center; border: 0; border-radius: 50%; color: #fff; background: var(--theme); box-shadow: 0 12px 30px color-mix(in srgb, var(--theme) 40%, transparent); cursor: pointer; }
    .cart-badge { position: absolute; top: -4px; right: -2px; min-width: 24px; height: 24px; padding: 0 6px; display: grid; place-items: center; border: 2px solid #fff; border-radius: 99px; color: #fff; background: #e11d48; font-size: 11px; font-weight: 900; }
    .toast { position: fixed; z-index: 30; left: 50%; bottom: 94px; width: max-content; max-width: calc(100% - 32px); padding: 12px 16px; border-radius: 12px; color: #fff; background: #18212f; box-shadow: var(--shadow); font-size: 14px; font-weight: 700; transform: translateX(-50%); animation: toast-in .2s ease-out; }
    @keyframes toast-in { from { opacity: 0; transform: translate(-50%, 8px); } }

    .state { min-height: 65vh; padding: 56px 22px; display: grid; place-items: center; text-align: center; }
    .state-card { width: min(100%, 430px); padding: 30px 22px; border: 1px solid var(--line); border-radius: 24px; background: #fff; box-shadow: var(--shadow); }
    .state-icon { width: 68px; height: 68px; margin: 0 auto 18px; display: grid; place-items: center; border-radius: 50%; color: var(--theme); background: var(--theme-soft); }
    .state-icon .icon { width: 30px; height: 30px; }
    .state h1, .state h3 { margin: 0 0 8px; font-size: 21px; }
    .state p { margin: 0; color: var(--muted); line-height: 1.55; }
    .retry-button { min-height: 44px; margin-top: 19px; padding: 0 20px; border: 0; border-radius: 12px; color: #fff; background: var(--theme); font-weight: 750; cursor: pointer; }
    .skeleton-header { height: 206px; border-radius: 0 0 28px 28px; }
    .skeleton-wrap { padding: 18px 14px; }
    .skeleton-search { height: 52px; margin-bottom: 16px; border-radius: 17px; }
    .skeleton-grid { display: grid; gap: 14px; }
    .skeleton-card { height: 180px; border-radius: 20px; }
    .shimmer { background: linear-gradient(100deg, #e9ebef 20%, #f7f7f8 40%, #e9ebef 60%); background-size: 220% 100%; animation: shimmer 1.35s infinite linear; }
    @keyframes shimmer { to { background-position-x: -220%; } }

    @media (min-width: 560px) {
      .catalog-content { padding: 24px 22px 52px; }
      .categories { margin-left: -22px; margin-right: -22px; padding-left: 22px; padding-right: 22px; }
      .products-grid, .skeleton-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .product-card { display: flex; flex-direction: column; min-height: 410px; }
      .product-image { min-height: 0; height: auto; aspect-ratio: 4 / 3; }
      .product-body { flex: 1; padding: 16px; }
      .product-description { font-size: 13px; }
      .buy-button { min-height: 46px; font-size: 13px; }
      .add-cart-button { min-height: 46px; font-size: 13px; }
      .filter-grid { grid-template-columns: 1.5fr 1fr 1fr; }
      .filter-field:first-child { grid-column: auto; }
    }
    @media (min-width: 760px) {
      body { padding: 24px 18px; }
      .app-shell { min-height: calc(100vh - 48px); overflow: hidden; border-radius: 30px; background: #f5f5f5; box-shadow: 0 10px 50px rgba(16,24,40,.1); }
      .store-header { padding: 32px 34px; border-radius: 0 0 30px 30px; display: flex; align-items: center; justify-content: space-between; gap: 30px; }
      .store-avatar { width: 82px; height: 82px; flex-basis: 82px; }
      .header-whatsapp { width: auto; min-width: 230px; margin-top: 0; padding: 0 24px; }
      .catalog-content { padding: 28px 34px 56px; }
      .categories { margin-left: -34px; margin-right: -34px; padding-left: 34px; padding-right: 34px; }
      .skeleton-header { border-radius: 0 0 30px 30px; }
      .skeleton-wrap { padding: 28px 34px; }
    }
    @media (min-width: 940px) { .products-grid, .skeleton-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; } }
  </style>
</head>
<body>
  <div class="app-shell">
    <div id="loadingState" aria-live="polite" aria-label="Carregando catálogo">
      <div class="skeleton-header shimmer"></div>
      <div class="skeleton-wrap">
        <div class="skeleton-search shimmer"></div>
        <div class="skeleton-grid">
          <div class="skeleton-card shimmer"></div><div class="skeleton-card shimmer"></div><div class="skeleton-card shimmer"></div>
        </div>
      </div>
    </div>

    <section id="errorState" class="state" hidden>
      <div class="state-card">
        <div class="state-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm1 15h-2v-2h2v2Zm0-4h-2V7h2v6Z"/></svg></div>
        <h1 id="errorTitle">Loja não encontrada</h1>
        <p id="errorMessage">Não foi possível localizar este catálogo.</p>
        <button id="retryButton" class="retry-button" type="button">Tentar novamente</button>
      </div>
    </section>

    <main id="contentState" hidden>
      <header class="store-header">
        <div class="store-main">
          <div id="storeAvatar" class="store-avatar" aria-hidden="true"></div>
          <div>
            <p class="eyebrow">Catálogo Digital</p>
            <h1 id="storeName" class="store-name"></h1>
          </div>
        </div>
        <button id="storeWhatsapp" class="header-whatsapp" type="button">
          <svg class="icon" viewBox="0 0 24 24"><path d="M16.75 13.96c-.25-.13-1.47-.73-1.7-.81-.23-.08-.39-.13-.56.13-.16.25-.64.81-.78.98-.15.17-.29.19-.54.06-1.46-.73-2.42-1.3-3.39-2.96-.26-.44.26-.41.73-1.36.08-.17.04-.31-.02-.44-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43h-.48c-.17 0-.44.06-.67.31-.23.25-.87.85-.87 2.07s.89 2.4 1.01 2.57c.13.17 1.75 2.67 4.24 3.75.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.11-.23-.17-.48-.29ZM12.04 2a9.84 9.84 0 0 0-8.41 14.94L2.05 22l5.18-1.53A9.95 9.95 0 1 0 12.04 2Zm0 17.93a8 8 0 0 1-4.08-1.12l-.29-.17-3.08.91.93-3-.19-.31a7.94 7.94 0 1 1 6.71 3.69Z"/></svg>
          Chamar no WhatsApp
        </button>
      </header>

      <div class="catalog-content">
        <div class="search-box">
          <svg class="icon" viewBox="0 0 24 24"><path d="m20.7 19.3-4.2-4.2a7.5 7.5 0 1 0-1.4 1.4l4.2 4.2a1 1 0 0 0 1.4-1.4ZM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z"/></svg>
          <input id="searchInput" class="search-input" type="search" placeholder="O que você está procurando?" autocomplete="off" aria-label="Buscar produtos">
          <button id="clearSearch" class="clear-search" type="button" aria-label="Limpar busca" hidden>✕</button>
        </div>
        <nav id="categoryFilters" class="categories" aria-label="Categorias"></nav>
        <section class="filters-panel" aria-label="Filtros dos produtos">
          <div class="filter-grid">
            <div class="filter-field"><label for="sortSelect">Ordenar por</label><select id="sortSelect" class="filter-control"><option value="relevance">Relevância</option><option value="price-asc">Menor preço</option><option value="price-desc">Maior preço</option><option value="name-asc">Nome A–Z</option></select></div>
            <div class="filter-field"><label for="minPrice">Preço mínimo</label><input id="minPrice" class="filter-control" type="number" min="0" step="0.01" inputmode="decimal" placeholder="R$ 0"></div>
            <div class="filter-field"><label for="maxPrice">Preço máximo</label><input id="maxPrice" class="filter-control" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Sem limite"></div>
          </div>
          <div class="filters-footer"><button id="clearFilters" class="clear-filters" type="button">Limpar filtros</button></div>
        </section>
        <div class="section-heading"><h2>Produtos</h2><span id="productCount" class="product-count"></span></div>
        <div id="productsContainer" class="products-grid"></div>
        <section id="emptyState" class="state" hidden>
          <div class="state-card">
            <div class="state-icon"><svg class="icon" viewBox="0 0 24 24"><path d="M20 6h-4V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2H4a2 2 0 0 0-2 2v11a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V8a2 2 0 0 0-2-2ZM10 4h4v2h-4V4Zm10 15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-5h6v1h4v-1h6v5Z"/></svg></div>
            <h3 id="emptyTitle">Nenhum produto disponível</h3>
            <p id="emptyMessage">Esta loja ainda não cadastrou produtos.</p>
          </div>
        </section>
      </div>
    </main>
  </div>
  <button id="cartButton" class="cart-fab" type="button" aria-label="Abrir carrinho"><svg class="icon" viewBox="0 0 24 24"><path d="M7 18a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm10 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4ZM6.2 6l.7 2H20l-2.1 6H8.8L5.2 3H2v2h1.8l3.6 10.7A2 2 0 0 0 9.3 17H19v-2H9.3l-.3-1H19a1 1 0 0 0 .9-.7l2.7-7.6A1 1 0 0 0 21.7 4H6l-.7-2H2v2h1.8L6.2 6Z"/></svg><span id="cartBadge" class="cart-badge" hidden>0</span></button>
  <div id="toast" class="toast" role="status" hidden></div>

  <script>
    "use strict";

    const DEFAULT_THEME = "#6c5ce7";
    const API_ORIGIN = (() => {
      const configured = window.API_BASE_URL || window.API_URL || "https://zapcatalogobackend-kg0c.onrender.com";
      if (["localhost", "127.0.0.1"].includes(window.location.hostname)) return "";
      return configured.replace(/\/$/, "").replace(/\/api$/, "");
    })();
    const state = { loja: null, produtos: [], carrinho: [], categoria: "todos", busca: "", ordem: "relevance", precoMin: null, precoMax: null, slug: "" };
    const elements = {
      loading: document.getElementById("loadingState"), error: document.getElementById("errorState"), content: document.getElementById("contentState"),
      errorTitle: document.getElementById("errorTitle"), errorMessage: document.getElementById("errorMessage"), retry: document.getElementById("retryButton"),
      avatar: document.getElementById("storeAvatar"), storeName: document.getElementById("storeName"), whatsapp: document.getElementById("storeWhatsapp"),
      search: document.getElementById("searchInput"), clearSearch: document.getElementById("clearSearch"), categories: document.getElementById("categoryFilters"),
      products: document.getElementById("productsContainer"), count: document.getElementById("productCount"), empty: document.getElementById("emptyState"),
      emptyTitle: document.getElementById("emptyTitle"), emptyMessage: document.getElementById("emptyMessage"),
      sort: document.getElementById("sortSelect"), minPrice: document.getElementById("minPrice"), maxPrice: document.getElementById("maxPrice"), clearFilters: document.getElementById("clearFilters"),
      cartButton: document.getElementById("cartButton"), cartBadge: document.getElementById("cartBadge"), toast: document.getElementById("toast")
    };

    function obterSlug() {
      const params = new URLSearchParams(window.location.search);
      const querySlug = params.get("slug") || params.get("hash");
      if (querySlug) return querySlug;
      const partes = window.location.pathname.split("/").filter(Boolean);
      return partes[0] === "c" ? partes[1] || "" : "";
    }

    function escaparHTML(valor) {
      const node = document.createElement("div");
      node.textContent = String(valor ?? "");
      return node.innerHTML;
    }

    function formatarPreco(valor) {
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number(valor) || 0);
    }

    function parsePreco(valor) {
      if (typeof valor === "number") return Number.isFinite(valor) ? valor : 0;
      const texto = String(valor ?? "").replace(/\s/g, "").replace(/^R\$/i, "");
      const normalizado = texto.includes(",") ? texto.replace(/\./g, "").replace(",", ".") : texto;
      const preco = Number(normalizado);
      return Number.isFinite(preco) ? preco : 0;
    }

    function parseVariacoes(variacoesTexto, precoBase) {
      const base = parsePreco(precoBase);
      return String(variacoesTexto || "")
        .split(/,(?!\d)/)
        .map(item => item.trim())
        .filter(Boolean)
        .map(item => {
          const indicePreco = item.lastIndexOf(":");
          if (indicePreco === -1) return { nome: item, preco: base };
          const nome = item.slice(0, indicePreco).trim();
          const precoTexto = item.slice(indicePreco + 1).trim();
          const temPreco = /^(?:R\$\s*)?\d+(?:[,.]\d{1,2})?$/.test(precoTexto);
          if (!nome || !temPreco) return { nome: item, preco: base };
          return { nome, preco: parsePreco(precoTexto) };
        })
        .filter(variacao => variacao.nome);
    }

    function normalizarWhatsApp(numero) {
      let digits = String(numero || "").replace(/\D/g, "");
      if (digits.startsWith("55") && (digits.length === 12 || digits.length === 13)) return digits;
      if (digits.length === 11) return `55${digits}`;
      if (digits.length === 10) return `55${digits.slice(0, 2)}9${digits.slice(2)}`;
      return digits;
    }

    function whatsappValido(numero) {
      return /^55\d{2}9\d{8}$/.test(numero);
    }

    function chaveCarrinho() { return `zapcatalogo:carrinho:${state.slug}`; }
    function carregarCarrinho() {
      try { const salvo = JSON.parse(localStorage.getItem(chaveCarrinho()) || "[]"); state.carrinho = Array.isArray(salvo) ? salvo : []; } catch { state.carrinho = []; }
      atualizarContadorCarrinho();
    }
    function salvarCarrinho() { localStorage.setItem(chaveCarrinho(), JSON.stringify(state.carrinho)); atualizarContadorCarrinho(); }
    function atualizarContadorCarrinho() {
      const total = state.carrinho.reduce((s, item) => s + (Number(item.quantidade) || 0), 0);
      elements.cartBadge.textContent = total > 99 ? "99+" : total;
      elements.cartBadge.hidden = total === 0;
      elements.cartButton.setAttribute("aria-label", `Abrir carrinho, ${total} ${total === 1 ? "item" : "itens"}`);
    }
    function mostrarToast(mensagem) { elements.toast.textContent = mensagem; elements.toast.hidden = false; clearTimeout(mostrarToast.timer); mostrarToast.timer = setTimeout(() => { elements.toast.hidden = true; }, 2200); }
    function obterVariacoes(produto) {
      return parseVariacoes(produto.variacoes, produto.preco);
    }
    function adicionarAoCarrinho(produto, variacao = null) {
      const baseId = String(produto.id ?? produto.codigo ?? produto.nome);
      const nomeVariacao = variacao?.nome || "";
      const precoFinal = variacao ? parsePreco(variacao.preco) : parsePreco(produto.preco);
      const id = nomeVariacao ? `${baseId}::${nomeVariacao}` : baseId;
      const existente = state.carrinho.find(item => item.id === id);
      if (existente) {
        existente.quantidade += 1;
        existente.preco = precoFinal;
        existente.preco_final = precoFinal;
        existente.variacao = nomeVariacao;
        existente.variacao_escolhida = nomeVariacao;
      } else {
        state.carrinho.push({ id, produto_id: baseId, nome: produto.nome || "Produto", preco: precoFinal, preco_final: precoFinal, imagem_url: obterImagem(produto), variacao: nomeVariacao, variacao_escolhida: nomeVariacao, quantidade: 1 });
      }
      salvarCarrinho(); mostrarToast(`${produto.nome || "Produto"} adicionado ao carrinho`);
    }
    function abrirCarrinho() { window.location.href = `/c/${encodeURIComponent(state.slug)}/carrinho`; }

    function normalizarCor(cor) {
      return /^#[0-9a-f]{6}$/i.test(cor || "") ? cor : DEFAULT_THEME;
    }

    function ajustarCor(hex, quantidade) {
      const numero = parseInt(hex.slice(1), 16);
      const canal = deslocamento => Math.max(0, Math.min(255, ((numero >> deslocamento) & 255) + quantidade));
      return `#${[canal(16), canal(8), canal(0)].map(v => v.toString(16).padStart(2, "0")).join("")}`;
    }

    function aplicarTema(corTema) {
      const cor = normalizarCor(corTema);
      const raiz = document.documentElement.style;
      raiz.setProperty("--theme", cor);
      raiz.setProperty("--theme-dark", ajustarCor(cor, -42));
      raiz.setProperty("--theme-soft", `${cor}18`);
      document.getElementById("themeMeta").content = cor;
    }

    function mostrarEstado(nome, detalhes = {}) {
      elements.loading.hidden = nome !== "loading";
      elements.error.hidden = nome !== "error";
      elements.content.hidden = nome !== "content";
      if (nome === "error") {
        elements.errorTitle.textContent = detalhes.titulo || "Não foi possível abrir a loja";
        elements.errorMessage.textContent = detalhes.mensagem || "Verifique sua conexão e tente novamente.";
        elements.retry.hidden = detalhes.retry === false;
      }
    }

    function renderizarLoja() {
      const nome = state.loja.nome_loja || "Minha Loja";
      elements.storeName.textContent = nome;
      document.title = `${nome} — Catálogo Digital`;
      elements.avatar.replaceChildren();
      if (state.loja.logo_url) {
        const imagem = new Image();
        imagem.src = state.loja.logo_url;
        imagem.alt = `Logo de ${nome}`;
        imagem.addEventListener("error", () => { elements.avatar.textContent = nome.trim().charAt(0) || "L"; }, { once: true });
        elements.avatar.appendChild(imagem);
      } else {
        elements.avatar.textContent = nome.trim().charAt(0) || "L";
      }
      const possuiWhatsApp = whatsappValido(normalizarWhatsApp(state.loja.whatsapp));
      elements.whatsapp.setAttribute("aria-disabled", String(!possuiWhatsApp));
      elements.whatsapp.title = possuiWhatsApp ? "Conversar com a loja" : "WhatsApp não informado";
    }

    function obterImagem(produto) {
      return produto.imagem_url || produto.foto_url || produto.image_url || produto.imagem || "";
    }

    function criarCardProduto(produto) {
      const card = document.createElement("article");
      const nome = produto.nome || "Produto";
      const imagem = obterImagem(produto);
      card.className = `product-card${imagem ? " has-image" : ""}`;
      const variacoes = obterVariacoes(produto);
      const precoBase = parsePreco(produto.preco);
      let variacaoSelecionada = null;
      const midia = imagem
        ? `<img src="${escaparHTML(imagem)}" alt="${escaparHTML(nome)}" loading="lazy" decoding="async">`
        : `<svg class="product-placeholder" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m12 2 9 4.5v11L12 22l-9-4.5v-11L12 2Zm0 2.24L6.1 7.18 12 10.13l5.9-2.95L12 4.24ZM5 8.8v7.46l6 3v-7.45l-6-3Zm8 10.46 6-3V8.8l-6 3v7.45Z"/></svg>`;
      const imageClasses = imagem ? "product-image loading" : "product-image is-placeholder";
      const variacoesHTML = variacoes.length
        ? `<div class="variation-group"><span class="variation-title">Escolha uma opção</span><div class="variation-options">${variacoes.map((opcao, indice) => {
            const rotulo = opcao.preco !== precoBase ? `${opcao.nome} · ${formatarPreco(opcao.preco)}` : opcao.nome;
            return `<button class="variation-chip" type="button" data-variation-index="${indice}" aria-pressed="false">${escaparHTML(rotulo)}</button>`;
          }).join("")}</div></div>`
        : "";
      card.innerHTML = `
        <div class="${imageClasses}">${midia}</div>
        <div class="product-body">
          <span class="category-badge">${escaparHTML(produto.categoria || "Geral")}</span>
          <h3 class="product-name">${escaparHTML(nome)}</h3>
          ${produto.descricao ? `<p class="product-description">${escaparHTML(produto.descricao)}</p>` : ""}
          <div class="product-footer">
            ${variacoesHTML}
            <strong class="product-price">${formatarPreco(precoBase)}</strong>
            <div class="product-actions"><button class="add-cart-button" type="button">Adicionar ao carrinho</button><button class="buy-button" type="button"><svg class="icon" viewBox="0 0 24 24"><path d="M16.75 13.96c-.25-.13-1.47-.73-1.7-.81-.23-.08-.39-.13-.56.13-.16.25-.64.81-.78.98-.15.17-.29.19-.54.06-1.46-.73-2.42-1.3-3.39-2.96-.26-.44.26-.41.73-1.36.08-.17.04-.31-.02-.44-.06-.12-.56-1.34-.76-1.84-.2-.48-.41-.42-.56-.43h-.48c-.17 0-.44.06-.67.31-.23.25-.87.85-.87 2.07s.89 2.4 1.01 2.57c.13.17 1.75 2.67 4.24 3.75.59.26 1.05.41 1.41.52.59.19 1.13.16 1.56.1.48-.07 1.47-.6 1.68-1.18.21-.58.21-1.08.15-1.18-.06-.11-.23-.17-.48-.29Z"/></svg>Comprar agora</button></div>
          </div>`;
      card.querySelectorAll(".variation-chip").forEach(chip => {
        chip.addEventListener("click", () => {
          variacaoSelecionada = variacoes[Number(chip.dataset.variationIndex)] || null;
          card.querySelectorAll(".variation-chip").forEach(item => {
            const ativo = item === chip;
            item.classList.toggle("active", ativo);
            item.setAttribute("aria-pressed", String(ativo));
          });
          card.querySelector(".product-price").textContent = formatarPreco(variacaoSelecionada?.preco ?? precoBase);
        });
      });
      card.querySelector(".buy-button").addEventListener("click", () => {
        if (variacoes.length && !variacaoSelecionada) { mostrarToast("Escolha uma opção antes de comprar."); return; }
        abrirWhatsApp(nome, variacaoSelecionada);
      });
      card.querySelector(".add-cart-button").addEventListener("click", () => {
        if (variacoes.length && !variacaoSelecionada) { mostrarToast("Escolha uma opção antes de adicionar ao carrinho."); return; }
        adicionarAoCarrinho(produto, variacaoSelecionada);
      });
      const img = card.querySelector("img");
      if (img) {
        img.onload = () => img.parentElement.classList.remove("loading");
        img.onerror = () => {
          img.parentElement.className = "product-image is-placeholder";
          img.parentElement.innerHTML = `<svg class="product-placeholder" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m12 2 9 4.5v11L12 22l-9-4.5v-11L12 2Zm0 2.24L6.1 7.18 12 10.13l5.9-2.95L12 4.24ZM5 8.8v7.46l6 3v-7.45l-6-3Zm8 10.46 6-3V8.8l-6 3v7.45Z"/></svg>`;
        };
        if (img.complete) {
          if (img.naturalWidth > 0) img.onload();
          else img.onerror();
        }
      }
      return card;
    }

    function produtosFiltrados() {
      const termo = state.busca.trim().toLocaleLowerCase("pt-BR");
      const filtrados = state.produtos.filter(produto => {
        const categoria = String(produto.categoria || "Geral");
        const correspondeCategoria = state.categoria === "todos" || categoria === state.categoria;
        const texto = `${produto.nome || ""} ${produto.descricao || ""} ${categoria} ${produto.variacoes || ""}`.toLocaleLowerCase("pt-BR");
        const preco = parsePreco(produto.preco);
        return correspondeCategoria && (!termo || texto.includes(termo)) && (state.precoMin === null || preco >= state.precoMin) && (state.precoMax === null || preco <= state.precoMax);
      });
      if (state.ordem === "price-asc") filtrados.sort((a, b) => parsePreco(a.preco) - parsePreco(b.preco));
      if (state.ordem === "price-desc") filtrados.sort((a, b) => parsePreco(b.preco) - parsePreco(a.preco));
      if (state.ordem === "name-asc") filtrados.sort((a, b) => String(a.nome || "").localeCompare(String(b.nome || ""), "pt-BR"));
      return filtrados;
    }

    function renderizarProdutos() {
      const produtos = produtosFiltrados();
      elements.products.replaceChildren(...produtos.map(criarCardProduto));
      elements.count.textContent = `${produtos.length} ${produtos.length === 1 ? "item" : "itens"}`;
      elements.empty.hidden = produtos.length > 0;
      elements.products.hidden = produtos.length === 0;
      if (!produtos.length) {
        const filtrando = Boolean(state.busca || state.categoria !== "todos");
        elements.emptyTitle.textContent = filtrando ? "Nenhum produto encontrado" : "Nenhum produto disponível";
        elements.emptyMessage.textContent = filtrando ? "Tente buscar outro termo ou selecionar outra categoria." : "Esta loja ainda não cadastrou produtos.";
      }
    }

    function renderizarCategorias() {
      const categorias = [...new Set(state.produtos.map(p => String(p.categoria || "Geral")).filter(Boolean))];
      elements.categories.replaceChildren();
      [["todos", "Todos"], ...categorias.map(c => [c, c])].forEach(([valor, rotulo]) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = `category-chip${state.categoria === valor ? " active" : ""}`;
        chip.textContent = rotulo;
        chip.setAttribute("aria-pressed", String(state.categoria === valor));
        chip.addEventListener("click", () => { state.categoria = valor; renderizarCategorias(); renderizarProdutos(); });
        elements.categories.appendChild(chip);
      });
    }

    function abrirWhatsApp(produtoNome = "", variacao = null) {
      const numero = normalizarWhatsApp(state.loja?.whatsapp);
      if (!whatsappValido(numero)) {
        alert("WhatsApp da loja inválido. Entre em contato com o lojista.");
        return;
      }
      const mensagem = produtoNome ? `Olá, tenho interesse no produto ${produtoNome}${variacao ? `\nOpção: ${variacao.nome}\nPreço: ${formatarPreco(variacao.preco)}` : ""}` : `Olá, gostaria de saber mais sobre o catálogo da ${state.loja.nome_loja || "loja"}`;
      window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank", "noopener,noreferrer");
    }

    async function carregarCatalogo() {
      mostrarEstado("loading");
      const slug = obterSlug();
      if (!slug) {
        mostrarEstado("error", { titulo: "Endereço inválido", mensagem: "O link deste catálogo está incompleto.", retry: false });
        return;
      }
      try {
        state.slug = slug;
        carregarCarrinho();
        const resposta = await fetch(`${API_ORIGIN}/api/catalogo/${encodeURIComponent(slug)}`, { headers: { Accept: "application/json" } });
        if (resposta.status === 404) {
          mostrarEstado("error", { titulo: "Loja não encontrada", mensagem: "Este catálogo não existe ou não está mais disponível.", retry: false });
          return;
        }
        if (!resposta.ok) throw new Error(`API respondeu com status ${resposta.status}`);
        const dados = await resposta.json();
        if (!dados.success || !dados.catalogo) throw new Error(dados.error || "Resposta inválida da API");
        state.loja = dados.catalogo;
        state.produtos = Array.isArray(dados.produtos) ? dados.produtos : [];
        state.categoria = "todos";
        state.busca = "";
        aplicarTema(state.loja.cor_tema);
        renderizarLoja();
        renderizarCategorias();
        renderizarProdutos();
        mostrarEstado("content");
      } catch (erro) {
        console.error("Erro ao carregar catálogo:", erro);
        mostrarEstado("error", { titulo: "Não foi possível carregar", mensagem: "Verifique sua conexão e tente novamente.", retry: true });
      }
    }

    elements.search.addEventListener("input", event => {
      state.busca = event.target.value;
      elements.clearSearch.hidden = !state.busca;
      renderizarProdutos();
    });
    elements.clearSearch.addEventListener("click", () => {
      state.busca = ""; elements.search.value = ""; elements.clearSearch.hidden = true; elements.search.focus(); renderizarProdutos();
    });
    elements.whatsapp.addEventListener("click", () => abrirWhatsApp());
    elements.retry.addEventListener("click", carregarCatalogo);
    elements.sort.addEventListener("change", event => { state.ordem = event.target.value; renderizarProdutos(); });
    elements.minPrice.addEventListener("input", event => { state.precoMin = event.target.value === "" ? null : Math.max(0, Number(event.target.value)); renderizarProdutos(); });
    elements.maxPrice.addEventListener("input", event => { state.precoMax = event.target.value === "" ? null : Math.max(0, Number(event.target.value)); renderizarProdutos(); });
    elements.clearFilters.addEventListener("click", () => { state.busca = ""; state.categoria = "todos"; state.ordem = "relevance"; state.precoMin = null; state.precoMax = null; elements.search.value = ""; elements.clearSearch.hidden = true; elements.sort.value = "relevance"; elements.minPrice.value = ""; elements.maxPrice.value = ""; renderizarCategorias(); renderizarProdutos(); });
    elements.cartButton.addEventListener("click", abrirCarrinho);
    document.addEventListener("DOMContentLoaded", carregarCatalogo);
  </script>
</body>
</html>
