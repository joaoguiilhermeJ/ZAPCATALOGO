<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Catálogo — ZapCatálogo (mobile-first)</title>
  <meta name="description" content="Catálogo de produtos, mobile-first, UX moderno">

  <!-- Tailwind via CDN (fast prototyping). Overrides below. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{--primary:#6C5CE7;--muted:#6b7280}
    html,body{height:100%}
    body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#0f172a;background:#f8fafc}

    /* Custom refinements on top of Tailwind */
    .card { border-radius:14px; box-shadow:0 6px 18px rgba(18,28,56,0.06); background:linear-gradient(180deg,#fff,#fbfbff); }
    .touch { min-height:44px; min-width:44px }
    .product-img {height:90px;width:100%;display:flex;align-items:center;justify-content:center;font-size:34px;border-radius:10px;background:linear-gradient(180deg,var(--primary)10%,transparent)}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{transform:translateY(-3px)}
    /* Drawer animations */
    .drawer { transform: translateX(110%); transition:transform .32s cubic-bezier(.2,.9,.25,1)}
    .drawer.open { transform: translateX(0%)}
    /* Toast */
    .toast { border-radius:10px; padding:10px 14px; box-shadow:0 8px 28px rgba(12,20,50,0.08) }
    /* Category scroll */
    .cat-scroll { -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .cat-scroll::-webkit-scrollbar { display:none }
  </style>
</head>
<body class="antialiased">

<div class="max-w-3xl mx-auto p-4">
  <header class="flex items-center justify-between mb-4">
    <div class="flex items-center gap-3">
      <div style="width:44px;height:44px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700">Z</div>
      <h1 class="text-lg font-bold">ZapCatálogo</h1>
    </div>
    <div class="relative">
      <button id="btnCartTop" class="touch w-12 h-12 rounded-full bg-white shadow flex items-center justify-center">
        <i class="fas fa-shopping-bag text-lg text-slate-700"></i>
        <span id="badgeTop" class="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full text-xs w-5 h-5 flex items-center justify-center hidden">0</span>
      </button>
    </div>
  </header>

  <!-- Search -->
  <div class="mb-4">
    <div class="relative">
      <input id="searchInput" type="search" placeholder="Buscar produtos..." class="w-full h-14 pl-12 pr-4 rounded-2xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-[color:var(--primary)]" />
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <div id="suggestions" class="absolute left-0 right-0 mt-2 bg-white rounded-xl shadow-lg hidden z-30"></div>
    </div>
  </div>

  <!-- Filters: categories horizontal scroll -->
  <div class="mb-4">
    <div id="categoryFilters" class="flex gap-3 overflow-x-auto cat-scroll py-2">
      <!-- buttons populated by JS -->
    </div>
  </div>

  <!-- Controls: sort + price -->
  <div class="flex items-center gap-3 mb-4">
    <select id="sortSelect" class="flex-1 h-12 rounded-xl border border-slate-200 px-3">
      <option value="relevance">Relevância</option>
      <option value="price-low">Menor preço</option>
      <option value="price-high">Maior preço</option>
      <option value="newest">Mais novos</option>
    </select>
    <div class="w-40 text-right text-sm text-slate-600">Máx: <span id="priceValue">R$ 10.000</span></div>
  </div>
  <input id="priceRange" type="range" min="0" max="10000" value="10000" step="50" class="w-full mb-4" />

  <!-- Products grid -->
  <section id="productsContainer" class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4"></section>

  <!-- Empty / Loading states -->
  <div id="emptyState" class="text-center text-slate-500 mt-8 hidden">Nenhum produto encontrado</div>

</div>

<!-- Cart Drawer (mobile full-screen) -->
<div id="cartDrawerWrapper" class="fixed inset-0 z-40 hidden">
  <div id="cartBackdrop" class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeCart()"></div>
  <aside id="cartDrawer" class="drawer absolute right-0 top-0 bottom-0 w-full sm:w-96 bg-white">
    <div class="p-4 border-b flex items-center justify-between">
      <h3 class="font-bold">Sua sacola</h3>
      <button id="closeCart" class="p-2 rounded-md touch"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItems" class="p-4 space-y-3 overflow-y-auto" style="max-height:60vh"></div>
    <div class="p-4 border-t">
      <div class="flex justify-between mb-3"><span>Subtotal</span><strong id="cartSubtotal">R$ 0,00</strong></div>
      <button id="checkoutBtn" class="w-full h-12 rounded-xl btn-primary">Enviar via WhatsApp</button>
    </div>
  </aside>
</div>

<!-- Toast container -->
<div id="toastHost" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 space-y-2"></div>

<!-- Font Awesome -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous"></script>
<!-- App script -->
<script src="/js/catalogo.refactor.js" defer></script>
</body>
</html>
